<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule &mdash; Boston Ni Baaje 1.0</title>
    <meta name="description" content="The full weekend schedule, venue, and contact details for Boston Ni Baaje 1.0." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"

    <link rel="stylesheet" href="/src/style.css" />

  <body>
    <header id="site-header"></header>

    <main>
      <section id="schedule">
        <div class="section-head reveal">
          <span class="eyebrow">Plan Your Weekend</span>
          <h2>Schedule</h2>
          <p>Here's the weekend lineup. Team-specific check-in details will be posted closer to the event.</p>
        </div>
        <div id="schedule-timeline"></div>

      <section id="location">

          <span class="eyebrow">Getting There</span>
          <h2>Location</h2>
        </div>
        <div class="info-grid" id="venue-details"></div>
        <div id="venue-about"></div>
      </section>

      <section id="contact" class="reveal">
        <div class="cta-banner">
          <h2>Questions?</h2>
          <p>
            Anything about the schedule or venue? Reach out at
            <a id="schedule-contact-email" href="mailto:info@bostonnibaaje.com">info@bostonnibaaje.com</a>.

        </div>

    <footer id="site-footer"></footer>

    <script type="module" src="/src/schedule.js"></script>
